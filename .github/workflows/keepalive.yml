name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "*/20 * * * *"  # every 20 minutes
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Visit Streamlit app and wake if asleep
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright

          url = "https://rag-based-faq-assistant-cquqdcexrc8hukztredmec.streamlit.app/"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto(url, timeout=60000)
              page.wait_for_timeout(3000)

              # Check if the app is asleep and click wake button if present
              try:
                  wake_button = page.get_by_text("Yes, get this app back up!", exact=False)
                  if wake_button.is_visible(timeout=5000):
                      print("App is asleep. Clicking wake button...")
                      wake_button.click()
                      # Wait for app to fully wake and load
                      page.wait_for_timeout(30000)
                      print("Waited for app to wake up.")
                  else:
                      print("App is already awake.")
              except Exception as e:
                  print(f"No wake button found (app likely already awake): {e}")

              print(f"Visited {url} successfully")
              browser.close()
          EOF
